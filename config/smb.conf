# Samba Configuration — PromisedLand File Server
# /etc/samba/smb.conf
# Author: Ashu Betrand

[global]
   workgroup = PROMISEDLAND
   server string = PromisedLand Independence File Server
   security = user
   map to guest = Bad User
   dns proxy = no
   log file = /var/log/samba/%m.log
   max log size = 1000

   # Authentication
   passdb backend = tdbsam
   unix password sync = yes
   pam password change = yes

   # Performance
   socket options = TCP_NODELAY IPTOS_LOWDELAY SO_RCVBUF=131072 SO_SNDBUF=131072
   use sendfile = yes

[homes]
   comment = Home Directories
   browseable = no
   writable = yes
   create mask = 0700
   directory mask = 0700
   valid users = %S

[operations]
   comment = Operations Team Shared Files
   path = /shared/operations
   browseable = yes
   writable = yes
   valid users = @operations, cshumaker
   write list = @operations
   create mask = 0660
   directory mask = 2770
   force group = operations

[applications]
   comment = Applications Team Shared Files
   path = /shared/applications
   browseable = yes
   writable = yes
   valid users = @applications, cshumaker
   write list = @applications
   create mask = 0660
   directory mask = 2770
   force group = applications

[infrastructure]
   comment = Infrastructure Team Shared Files
   path = /shared/infrastructure
   browseable = yes
   writable = yes
   valid users = @infrastructure, cshumaker
   write list = @infrastructure
   create mask = 0660
   directory mask = 2770
   force group = infrastructure

[crm]
   comment = CRM Team Shared Files
   path = /shared/crm
   browseable = yes
   writable = yes
   valid users = @crm, cshumaker
   write list = @crm
   create mask = 0660
   directory mask = 2770
   force group = crm
